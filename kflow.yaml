# Kflow task defaults for the BET 2026 stepwise model runner.
#
# This file describes how Kflow should run the repo. Most model-specific edits
# belong in job-config.R; this file is for Docker, resources, default env,
# saved outputs, and automatic follow-up tasks.

# Stable task id shown in Kflow and used by the API:
#   /api/job/ofp-sam-bet-2026-stepwise
name: ofp-sam-bet-2026-stepwise
description: Run numbered BET 2026 stepwise MFCL model folders.

# Command executed inside the Docker container after checkout.
command: bash run.sh

# Use the tagged tuna-flow image so local/Kflow runs do not drift unexpectedly.
# Change deliberately, for example:
#   ghcr.io/pacificcommunity/tuna-flow:v1.7
#   ghcr.io/pacificcommunity/tuna-flow:latest
docker_image: ghcr.io/pacificcommunity/tuna-flow:v1.7

# HTCondor resource request. Increase memory/disk before increasing CPUs unless
# the MFCL command itself can use more threads.
resources:
  cpus: 2
  memory: 12GB
  disk: 8GB

exclude_machines:
  - nouofpcand05
  - nouofpcand14
  - nouofpcand16
  - nouofpcand17
  - nouofpcand19

env:
  # Default selected model folder. Override per job in the Kflow job config.
  # Examples: 01-base-11par, 01-base-11par,03-review-11par, all
  STEP_SELECT: 01-base-11par

  # Default Kflow display labels for the default model. `make kflow` computes
  # these from job-config.R. When launching directly from the Kflow UI and
  # changing STEP_SELECT, update these fields too if the job list should show
  # the selected model label before the run starts.
  JOB_TITLE: "BET stepwise: Base 11.par"
  JOB_DESCRIPTION: "Run the selected BET model folder and save compact plot-ready payloads."
  MODEL_LABEL: "Base 11.par"
  JOB_KEY: 01-base-11par
  FLOW_GROUP: bet-2026-base
  FLOW_SPECIES: BET
  FLOW_SPECIES_LABEL: bigeye tuna
  FLOW_ASSESSMENT_YEAR: "2026"
  PLOT_TITLE: BET 2026 report-ready figures
  PLOT_MAX_FISHERIES: "18"
  REPORT_QMD: assessment-report.qmd
  REPORT_FILE_STEM: bet-2026-report
  RUN_MODE: last_par
  INPUT_PAR: 11.par
  FRQ: bet.frq
  OUTPUT_PAR: ""
  FEVALS: "1"

  # true streams the full MFCL output to Kflow logs. false keeps logs quieter.
  MFCL_LIVE_LOG: "true"

  # mfclshiny is private, so runtime package updates need a forwarded GitHub
  # token from Kflow. Leave these true for cluster jobs.
  KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
  KFLOW_RUNTIME_UPDATE: auto
  KFLOW_RUNTIME_PACKAGES: mfclshiny=PacificCommunity/mfclshiny@9bd29ff
  KFLOW_RUNTIME_GITHUB_AUTH: "true"
  KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
  KFLOW_REPORT_COMMIT_GENERATED: "true"
  KFLOW_REPORT_PUSH_GENERATED: "true"
  KFLOW_REPORT_PUBLISH_REQUIRED: "true"

# Keep artifacts compact. The runner writes only model_payload.rds, final .par,
# and small index CSVs under outputs/.
output_patterns:
  - outputs/**

# Automatic dependency chain:
#   stepwise succeeds -> run ofp-sam-bet-2026-results with this job as input
#   results succeeds  -> run the report task from downstream task config
#
# One-off command-line override:
#   make kflow TRIGGER_NEXT=false STEP_SELECT=01-base-11par
triggers:
  on_success:
    - key: results-from-stepwise
      report: ofp-sam-bet-2026-results
      input_jobs:
        - "{{ job.id }}"
      env:
        FLOW_GROUP: "{{ job.config.FLOW_GROUP }}"
        JOB_TITLE: BET results
        JOB_KEY: results
        JOB_DESCRIPTION: Build report-ready figures and tables from the selected stepwise model payload.
        PLOT_TITLE: "{{ job.config.PLOT_TITLE }}"
        PLOT_MAX_FISHERIES: "{{ job.config.PLOT_MAX_FISHERIES }}"
        FLOW_SPECIES: "{{ job.config.FLOW_SPECIES }}"
        FLOW_SPECIES_LABEL: "{{ job.config.FLOW_SPECIES_LABEL }}"
        FLOW_ASSESSMENT_YEAR: "{{ job.config.FLOW_ASSESSMENT_YEAR }}"
        REPORT_QMD: "{{ job.config.REPORT_QMD }}"
        REPORT_FILE_STEM: "{{ job.config.REPORT_FILE_STEM }}"
        KFLOW_REPORT_COMMIT_GENERATED: "{{ job.config.KFLOW_REPORT_COMMIT_GENERATED }}"
        KFLOW_REPORT_PUSH_GENERATED: "{{ job.config.KFLOW_REPORT_PUSH_GENERATED }}"
        KFLOW_REPORT_PUBLISH_REQUIRED: "{{ job.config.KFLOW_REPORT_PUBLISH_REQUIRED }}"
        KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
        KFLOW_RUNTIME_UPDATE: auto
        KFLOW_RUNTIME_PACKAGES: mfclshiny=PacificCommunity/mfclshiny@9bd29ff
        MFCLSHINY_REPORT_DPI: "180"
        MFCLSHINY_OPTIMIZE_FIGURES: "false"
        PLOT_OPTIMIZE_FIGURES: "true"
        PLOT_OPTIMIZE_MODE: lossy
        PLOT_PNGQUANT_QUALITY: "60-85"
        PLOT_WEBP_FIGURES: "true"
        PLOT_WEBP_QUALITY: "72"
        PLOT_PDF_JPEG_FIGURES: "true"
        PLOT_JPEG_QUALITY: "82"
        PLOT_JPEG_SAMPLING_FACTOR: "4:2:0"
        KFLOW_RUNTIME_GITHUB_AUTH: "true"
        KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
      tags:
        auto: "true"
        stage: results

# Fields exposed as optional job config in the Kflow UI.
# Add a field here only if the user should be able to override it at launch.
job_config:
  optional:
    - STEP_SELECT
    - TRIGGER_NEXT
    - FLOW_GROUP
    - JOB_TITLE
    - JOB_DESCRIPTION
    - JOB_KEY
    - MODEL_LABEL
    - RUN_MODE
    - INPUT_PAR
    - FRQ
    - OUTPUT_PAR
    - FEVALS
    - MFCL_FEVALS
    - PROGRAM_PATH
    - SMOKE_FEVALS
    - MFCL_LIVE_LOG
    - PLOT_TITLE
    - PLOT_MAX_FISHERIES
    - FLOW_SPECIES
    - FLOW_SPECIES_LABEL
    - FLOW_ASSESSMENT_YEAR
    - REPORT_QMD
    - REPORT_FILE_STEM
    - KFLOW_REPORT_COMMIT_GENERATED
    - KFLOW_REPORT_PUSH_GENERATED
    - KFLOW_REPORT_PUBLISH_REQUIRED
    - KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
    - KFLOW_RUNTIME_UPDATE
    - KFLOW_RUNTIME_PACKAGES
    - KFLOW_RUNTIME_GITHUB_AUTH
    - KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME
    - MFCLSHINY_REPORT_DPI
    - MFCLSHINY_OPTIMIZE_FIGURES
    - PLOT_OPTIMIZE_FIGURES
    - PLOT_OPTIMIZE_MODE
    - PLOT_PNGQUANT_QUALITY
    - PLOT_WEBP_FIGURES
    - PLOT_WEBP_QUALITY
    - PLOT_PDF_JPEG_FIGURES
    - PLOT_JPEG_QUALITY
    - PLOT_JPEG_SAMPLING_FACTOR
